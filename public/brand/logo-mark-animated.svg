<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <style>
    svg { color: #211a10 }
    .seed { fill: #c2502a }
    @media (prefers-color-scheme: dark) {
      svg { color: #efe6d2 }
      .seed { fill: #e27d5e }
    }
    /* One-shot "struck onto the page" reveal. Rest state is the finished mark,
       so motion-off / reduced-motion shows the complete colophon. */
    .ring { stroke-dasharray: 100; stroke-dashoffset: 0;
      animation: draw 720ms cubic-bezier(0.32,0.72,0,1) both }
    .ring.inner { animation-delay: 120ms }
    .nib  { transform-box: fill-box; transform-origin: center;
      animation: rise 460ms cubic-bezier(0.32,0.72,0,1) 360ms both }
    .nest { transform-box: fill-box; transform-origin: center;
      animation: rise 460ms cubic-bezier(0.32,0.72,0,1) 500ms both }
    .seed { transform-box: fill-box; transform-origin: center;
      animation: settle 560ms cubic-bezier(0.32,0.72,0,1) 700ms both }
    @keyframes draw { from { stroke-dashoffset: 100 } to { stroke-dashoffset: 0 } }
    @keyframes rise { from { opacity: 0; transform: scale(0.92) } to { opacity: 1; transform: scale(1) } }
    @keyframes settle {
      0%   { opacity: 0; transform: translateY(-6px) scale(0.6) }
      70%  { opacity: 1; transform: translateY(0) scale(1) }
      84%  { transform: translateY(0) scaleY(0.86) }
      100% { transform: translateY(0) scaleY(1) }
    }
    @media (prefers-reduced-motion: reduce) {
      .ring, .nib, .nest, .seed { animation: none }
    }
  </style>
  <circle class="ring" cx="32" cy="32" r="27.5" stroke="currentColor" stroke-width="1.3" pathLength="100"/>
  <circle class="ring inner" cx="32" cy="32" r="23.8" stroke="currentColor" stroke-width="0.8" opacity="0.32" pathLength="100"/>
  <path class="nib" fill="currentColor" fill-rule="evenodd" d="M32 13.5C28 17.5 25.2 22.5 25.2 27.5 25.2 32.5 28 36.5 32 40 36 36.5 38.8 32.5 38.8 27.5 38.8 22.5 36 17.5 32 13.5ZM32 21.4A1.6 1.6 0 1 0 32.01 21.4ZM31.3 23.5 32.7 23.5 32.4 37.5 31.6 37.5Z"/>
  <g class="nest" stroke="currentColor" stroke-linecap="round">
    <path d="M19.5 41.5Q32 53 44.5 41.5" stroke-width="1.7"/>
    <path d="M23 40.5Q32 48.5 41 40.5" stroke-width="1.3"/>
    <path d="M19.5 41.5Q18.4 38.5 19.1 36.5" stroke-width="1.5"/>
    <path d="M44.5 41.5Q45.6 38.5 44.9 36.5" stroke-width="1.5"/>
  </g>
  <circle class="seed" cx="32" cy="43.4" r="3.3"/>
</svg>
